// ============================================================
// VIRTUAL FILE SYSTEM
// ============================================================
class VirtualFileSystem {
  constructor() {
    this.cwd = '/home/user';
    this.root = {
      name: '', type: 'dir', children: {}, parent: null,
      created: Date.now(), mode: 'rwxr-xr-x', owner: 'user', group: 'user'
    };
    this.initStructure();
    this.loadState();
  }

  loadState() {
    try {
      const saved = localStorage.getItem('terminal_fs');
      if (saved) {
        const data = JSON.parse(saved);
        this.root = data.root;
        this.cwd = data.cwd || '/home/user';
      }
    } catch(e) {}
  }

  saveState() {
    try {
      localStorage.setItem('terminal_fs', JSON.stringify({ root: this.root, cwd: this.cwd }));
    } catch(e) {}
  }

  initStructure() {
    const dirs = [
      '/home', '/home/user', '/home/user/Documents', '/home/user/Downloads',
      '/home/user/Pictures', '/home/user/Music', '/home/user/Videos',
      '/tmp', '/var', '/var/log', '/var/www', '/etc', '/bin', '/usr', '/usr/bin',
      '/usr/local', '/usr/local/bin', '/lib', '/opt', '/mnt', '/media',
      '/boot', '/srv', '/root', '/sys', '/dev', '/proc'
    ];
    dirs.forEach(d => this.mkdirp(d));
    this.writeFile('/home/user/README.txt', `Welcome to TerminalVault Linux!\nType 'help' for available commands.\n`);
    this.writeFile('/etc/hostname', 'terminalvault\n');
    this.writeFile('/etc/os-release', 'NAME="TerminalVault"\nVERSION="1.0"\nID=terminalvault\n');
    this.mkdirp('/home/user/.config');
    this.writeFile('/home/user/.bashrc', 'alias ll="ls -la"\nalias la="ls -la"\nexport PS1="\\u@\\h:\\w$ "\n');
    this.writeFile('/home/user/.profile', 'export PATH=$PATH:/usr/local/bin\n');
  }

  mkdirp(path) {
    const parts = this.resolve(path).split('/').filter(Boolean);
    let node = this.root;
    for (const p of parts) {
      if (!node.children[p]) {
        node.children[p] = { name: p, type: 'dir', children: {}, parent: node, created: Date.now(), mode: 'rwxr-xr-x', owner: 'user', group: 'user' };
      }
      node = node.children[p];
    }
    this.saveState();
    return node;
  }

  resolve(path) {
    if (!path || path === '') return this.cwd;
    if (path.startsWith('/')) return this.normalize(path);
    return this.normalize(this.cwd + '/' + path);
  }

  normalize(p) {
    const parts = p.split('/').filter(Boolean);
    const result = [];
    for (const part of parts) {
      if (part === '.') continue;
      if (part === '..') { result.pop(); continue; }
      result.push(part);
    }
    return '/' + result.join('/');
  }

  getNode(path) {
    const parts = this.resolve(path).split('/').filter(Boolean);
    let node = this.root;
    for (const p of parts) {
      if (!node.children || !node.children[p]) return null;
      node = node.children[p];
    }
    return node;
  }

  isDir(path) {
    const node = this.getNode(path);
    return node && node.type === 'dir';
  }

  isFile(path) {
    const node = this.getNode(path);
    return node && node.type === 'file';
  }

  readFile(path) {
    const node = this.getNode(path);
    if (!node) return null;
    if (node.type !== 'file') return null;
    return node.content || '';
  }

  writeFile(path, content) {
    const parts = this.resolve(path).split('/').filter(Boolean);
    const fileName = parts.pop();
    let node = this.root;
    for (const p of parts) {
      if (!node.children[p]) {
        node.children[p] = { name: p, type: 'dir', children: {}, parent: node, created: Date.now(), mode: 'rwxr-xr-x', owner: 'user', group: 'user' };
      }
      node = node.children[p];
    }
    try {
      node.children[fileName] = {
        name: fileName, type: 'file', content: content || '',
        parent: node, created: Date.now(), modified: Date.now(),
        size: (content || '').length, mode: 'rw-r--r--', owner: 'user', group: 'user'
      };
      this.saveState();
      return true;
    } catch(e) { return false; }
  }

  deleteFile(path) {
    const parts = this.resolve(path).split('/').filter(Boolean);
    const name = parts.pop();
    let node = this.root;
    for (const p of parts) {
      if (!node.children[p]) return false;
      node = node.children[p];
    }
    if (node.children[name]) {
      delete node.children[name];
      this.saveState();
      return true;
    }
    return false;
  }

  deleteDir(path) {
    const parts = this.resolve(path).split('/').filter(Boolean);
    const name = parts.pop();
    let node = this.root;
    for (const p of parts) {
      if (!node.children[p]) return false;
      node = node.children[p];
    }
    if (node.children[name] && node.children[name].type === 'dir') {
      if (Object.keys(node.children[name].children).length > 0) return false;
      delete node.children[name];
      this.saveState();
      return true;
    }
    return false;
  }

  listDir(path) {
    const node = this.getNode(path);
    if (!node || node.type !== 'dir') return null;
    return Object.entries(node.children || {}).map(([name, n]) => ({
      name, type: n.type, size: n.size || 0, mode: n.mode || 'rw-r--r--',
      owner: n.owner || 'user', group: n.group || 'user',
      created: n.created || Date.now(), modified: n.modified || n.created || Date.now(),
      children: n.type === 'dir' ? Object.keys(n.children).length : undefined
    }));
  }

  copy(src, dest) {
    const content = this.readFile(src);
    if (content !== null) return this.writeFile(dest, content);
    return false;
  }

  move(src, dest) {
    if (this.copy(src, dest)) { this.deleteFile(src); return true; }
    return false;
  }

  getPath(node) {
    const parts = [];
    let current = node;
    while (current && current.name) {
      parts.unshift(current.name);
      current = current.parent;
    }
    return '/' + parts.join('/');
  }

  find(pattern, path) {
    const results = [];
    const search = (p) => {
      const entries = this.listDir(p) || [];
      for (const e of entries) {
        const fullPath = p === '/' ? '/' + e.name : p + '/' + e.name;
        if (e.name.includes(pattern) || fullPath.includes(pattern)) results.push(fullPath);
        if (e.type === 'dir') search(fullPath);
      }
    };
    search(path || this.cwd);
    return results;
  }

  du(path) {
    let total = 0;
    const walk = (p) => {
      const entries = this.listDir(p) || [];
      for (const e of entries) {
        const fullPath = p === '/' ? '/' + e.name : p + '/' + e.name;
        if (e.type === 'file') total += e.size || 0;
        else walk(fullPath);
      }
    };
    walk(path);
    return total;
  }
}

// ============================================================
// COMMAND ENGINE
// ============================================================
class CommandEngine {
  constructor(term, vfs) {
    this.term = term;
    this.vfs = vfs;
    this.history = [];
    this.historyIndex = -1;
    this.aliases = {};
    this.variables = { PATH: '/usr/local/bin:/usr/bin:/bin', HOME: '/home/user', USER: 'user', SHELL: '/bin/bash', TERM: 'xterm-256color' };
    this.currentInput = '';
    this.running = false;
    this.commands = this.initCommands();
  }

  initCommands() {
    const self = this;
    return {
      help(args) { self.printHelp(); return 0; },
      clear(args) { self.term.clear(); return 0; },
      exit(args) { self.println('logout'); return 0; },
      
      pwd(args) { self.println(self.vfs.cwd); return 0; },
      
      cd(args) {
        const target = args[0] || self.variables.HOME;
        if (target === '-') {
          if (self._oldpwd) {
            const tmp = self._oldpwd;
            self._oldpwd = self.vfs.cwd;
            self.vfs.cwd = tmp;
          }
          return 0;
        }
        const resolved = self.vfs.resolve(target);
        if (self.vfs.isDir(resolved)) {
          self._oldpwd = self.vfs.cwd;
          self.vfs.cwd = resolved;
          return 0;
        }
        self.println(`cd: ${target}: No such directory`);
        return 1;
      },

      ls(args) {
        let target = self.vfs.cwd;
        let showAll = false;
        let long = false;
        let human = false;
        
        for (const a of args) {
          if (a === '-la' || a === '-al') { long = true; showAll = true; }
          else if (a === '-l') long = true;
          else if (a === '-a') showAll = true;
          else if (a === '-lh' || a === '-hl') { long = true; human = true; }
          else target = self.vfs.resolve(a);
        }
        
        const entries = self.vfs.listDir(target);
        if (!entries) { self.println(`ls: cannot access '${target}': No such file or directory`); return 1; }
        
        if (long) {
          let total = 0;
          const filtered = entries.filter(e => showAll || !e.name.startsWith('.'));
          filtered.forEach(e => {
            const perms = e.mode.padEnd(10);
            const links = '1';
            const owner = e.owner.padEnd(6);
            const group = e.group.padEnd(6);
            const size = human ? self.humanSize(e.size) : String(e.size).padStart(5);
            const date = new Date(e.modified || e.created).toISOString().replace(/T.*/, '');
            self.println(`${e.type === 'dir' ? 'd' : '-'}${perms} ${links} ${owner} ${group} ${size} ${date} ${e.name}${e.type === 'dir' ? '/' : ''}`);
          });
        } else {
          const filtered = entries.filter(e => showAll || !e.name.startsWith('.'));
          const cols = Math.max(1, Math.floor((self.term.cols || 80) / 20));
          let line = '';
          filtered.forEach((e, i) => {
            const name = e.name + (e.type === 'dir' ? '/' : '');
            line += name.padEnd(20);
            if ((i + 1) % cols === 0) { self.println(line); line = ''; }
          });
          if (line) self.println(line);
        }
        return 0;
      },

      echo(args) { self.println(args.join(' ')); return 0; },

      cat(args) {
        if (args.length === 0) { self.println(''); return 0; }
        for (const f of args) {
          const content = self.vfs.readFile(f);
          if (content === null) { self.println(`cat: ${f}: No such file`); return 1; }
          self.print(content.endsWith('\n') ? content.substring(0, content.length - 1) : content);
        }
        return 0;
      },

      touch(args) {
        for (const f of args) {
          const path = self.vfs.resolve(f);
          if (self.vfs.isFile(path)) {
            const content = self.vfs.readFile(path);
            self.vfs.writeFile(path, content);
          } else if (!self.vfs.isDir(self.vfs.resolve(f).split('/').slice(0,-1).join('/') || '/')) {
            self.println(`touch: cannot touch '${f}': No such file or directory`);
          } else {
            self.vfs.writeFile(path, '');
          }
        }
        return 0;
      },

      mkdir(args) {
        let parent = false;
        const targets = [];
        for (const a of args) {
          if (a === '-p') parent = true;
          else targets.push(a);
        }
        for (const d of targets) {
          const path = self.vfs.resolve(d);
          if (parent) { self.vfs.mkdirp(path); }
          else {
            const parts = path.split('/').filter(Boolean);
            const name = parts.pop();
            const parentPath = '/' + parts.join('/');
            const parentNode = self.vfs.getNode(parentPath);
            if (!parentNode) { self.println(`mkdir: cannot create directory '${d}': No such file or directory`); continue; }
            if (parentNode.children[name]) { self.println(`mkdir: cannot create directory '${d}': File exists`); continue; }
            parentNode.children[name] = { name, type: 'dir', children: {}, parent: parentNode, created: Date.now(), mode: 'rwxr-xr-x', owner: 'user', group: 'user' };
            self.vfs.saveState();
          }
        }
        return 0;
      },

      rm(args) {
        let recursive = false;
        let force = false;
        const targets = [];
        for (const a of args) {
          if (a === '-r' || a === '-rf' || a === '-fr') recursive = true;
          if (a === '-f' || a === '-rf' || a === '-fr') force = true;
          else if (!a.startsWith('-')) targets.push(a);
        }
        for (const t of targets) {
          const path = self.vfs.resolve(t);
          if (self.vfs.isFile(path)) {
            if (!force) { self.println(`rm: remove regular file '${t}'? (use -f to force)`); }
            self.vfs.deleteFile(path);
          } else if (self.vfs.isDir(path)) {
            if (recursive) {
              const entries = self.vfs.listDir(path);
              if (entries && entries.length > 0) {
                if (!force) { self.println(`rm: remove directory '${t}'? (use -rf to force)`); return 1; }
              }
              self.vfs.deleteDir(path);
              if (!self.vfs.isDir(path)) continue;
              const parts = path.split('/').filter(Boolean);
              const name = parts.pop();
              const pp = '/' + parts.join('/');
              const parent = self.vfs.getNode(pp);
              if (parent) { delete parent.children[name]; self.vfs.saveState(); }
            } else {
              self.println(`rm: cannot remove '${t}': Is a directory`);
            }
          } else {
            if (!force) self.println(`rm: cannot remove '${t}': No such file or directory`);
          }
        }
        return 0;
      },

      rmdir(args) {
        for (const d of args) {
          const path = self.vfs.resolve(d);
          if (!self.vfs.isDir(path)) { self.println(`rmdir: failed to remove '${d}': No such file or directory`); continue; }
          const entries = self.vfs.listDir(path);
          if (entries && entries.some(e => !e.name.startsWith('.'))) {
            self.println(`rmdir: failed to remove '${d}': Directory not empty`);
            continue;
          }
          self.vfs.deleteDir(path);
        }
        return 0;
      },

      cp(args) {
        if (args.length < 2) { self.println('cp: missing file operand'); return 1; }
        const src = args[0], dest = args[1];
        const srcPath = self.vfs.resolve(src);
        const destPath = self.vfs.resolve(dest);
        if (!self.vfs.isFile(srcPath)) { self.println(`cp: cannot stat '${src}': No such file`); return 1; }
        self.vfs.copy(srcPath, destPath);
        return 0;
      },

      mv(args) {
        if (args.length < 2) { self.println('mv: missing file operand'); return 1; }
        const src = args[0], dest = args[1];
        const srcPath = self.vfs.resolve(src);
        const destPath = self.vfs.resolve(dest);
        if (!self.vfs.isFile(srcPath)) { self.println(`mv: cannot stat '${src}': No such file`); return 1; }
        self.vfs.move(srcPath, destPath);
        return 0;
      },

      head(args) {
        let n = 10;
        const files = [];
        for (let i = 0; i < args.length; i++) {
          if (args[i] === '-n' && i + 1 < args.length) { n = parseInt(args[++i]) || 10; }
          else files.push(args[i]);
        }
        for (const f of files) {
          const content = self.vfs.readFile(f);
          if (content === null) { self.println(`head: ${f}: No such file`); continue; }
          const lines = content.split('\n').slice(0, n);
          self.println(lines.join('\n'));
        }
        return 0;
      },

      tail(args) {
        let n = 10;
        const files = [];
        for (let i = 0; i < args.length; i++) {
          if (args[i] === '-n' && i + 1 < args.length) { n = parseInt(args[++i]) || 10; }
          else files.push(args[i]);
        }
        for (const f of files) {
          const content = self.vfs.readFile(f);
          if (content === null) { self.println(`tail: ${f}: No such file`); continue; }
          const lines = content.split('\n');
          self.println(lines.slice(Math.max(0, lines.length - n)).join('\n'));
        }
        return 0;
      },

      wc(args) {
        for (const f of args) {
          const content = self.vfs.readFile(f);
          if (content === null) { self.println(`wc: ${f}: No such file`); continue; }
          const lines = content.split('\n').length;
          const words = content.split(/\s+/).filter(Boolean).length;
          const chars = content.length;
          self.println(`${lines} ${words} ${chars} ${f}`);
        }
        return 0;
      },

      grep(args) {
        if (args.length < 1) { self.println('grep: missing pattern'); return 1; }
        let pattern = args[0];
        let ignoreCase = false;
        let filePattern = null;
        let idx = 0;
        if (args[idx] === '-i') { ignoreCase = true; idx++; }
        pattern = args[idx++];
        const files = args.slice(idx);
        for (const f of (files.length ? files : [self.vfs.cwd])) {
          const content = files.length ? self.vfs.readFile(f) : null;
          if (content === null && files.length) { continue; }
          const lines = (content || '').split('\n');
          lines.forEach((line, i) => {
            const test = ignoreCase ? line.toLowerCase() : line;
            const pat = ignoreCase ? pattern.toLowerCase() : pattern;
            if (test.includes(pat)) {
              self.println(`${files.length > 1 ? f + ':' : ''}${line}`);
            }
          });
        }
        return 0;
      },

      find(args) {
        const path = args[0] ? self.vfs.resolve(args[0]) : self.vfs.cwd;
        const name = args[1] && args[1] !== '-name' ? args[1] : args[2];
        if (!name) { self.println('find: missing operand'); return 1; }
        const results = self.vfs.find(name, path);
        results.forEach(r => self.println(r));
        return 0;
      },

      ps(args) {
        self.println('  PID TTY          TIME CMD');
        self.println('    1 pts/0    00:00:05 bash');
        self.println('  123 pts/0    00:00:00 ps');
        return 0;
      },

      kill(args) {
        if (!args[0]) { self.println('kill: usage: kill [-s sigspec] pid'); return 1; }
        self.println(`[1]+  Terminated    process ${args[0]}`);
        return 0;
      },

      whoami(args) { self.println(self.variables.USER); return 0; },
      id(args) { self.println(`uid=1000(${self.variables.USER}) gid=1000(${self.variables.USER}) groups=1000(${self.variables.USER})`); return 0; },

      uname(args) {
        if (args[0] === '-a') self.println('Linux terminalvault 6.1.0-TerminalVault #1 SMP PREEMPT_DYNAMIC aarch64 GNU/Linux');
        else self.println('Linux');
        return 0;
      },

      date(args) { self.println(new Date().toString()); return 0; },

      cal(args) {
        const now = new Date();
        const month = now.getMonth();
        const year = now.getFullYear();
        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        self.println(`      ${months[month]} ${year}`);
        self.println('Su Mo Tu We Th Fr Sa');
        let line = '   '.repeat(firstDay);
        for (let d = 1; d <= daysInMonth; d++) {
          line += String(d).padStart(2) + ' ';
          if ((d + firstDay) % 7 === 0) { self.println(line); line = ''; }
        }
        if (line) self.println(line);
        return 0;
      },

      history(args) {
        const start = Math.max(0, self.history.length - 100);
        for (let i = start; i < self.history.length; i++) {
          self.println(`${String(i + 1).padStart(5)}  ${self.history[i]}`);
        }
        return 0;
      },

      alias(args) {
        if (args.length === 0) {
          Object.entries(self.aliases).forEach(([k,v]) => self.println(`alias ${k}='${v}'`));
          return 0;
        }
        const eqIdx = args[0].indexOf('=');
        if (eqIdx > 0) {
          const name = args[0].substring(0, eqIdx);
          const val = args[0].substring(eqIdx + 1).replace(/^['"]|['"]$/g, '');
          self.aliases[name] = val;
        }
        return 0;
      },

      export(args) {
        for (const a of args) {
          const eqIdx = a.indexOf('=');
          if (eqIdx > 0) {
            self.variables[a.substring(0, eqIdx)] = a.substring(eqIdx + 1);
          }
        }
        return 0;
      },

      which(args) {
        if (!args[0]) return 1;
        if (self.commands[args[0]]) { self.println(`/usr/bin/${args[0]}`); return 0; }
        self.println(`${args[0]} not found`);
        return 1;
      },

      chmod(args) { self.println(''); return 0; },

      sort(args) {
        if (args.length === 0) return 0;
        const content = self.vfs.readFile(args[0]);
        if (content === null) { self.println(`sort: ${args[0]}: No such file`); return 1; }
        self.println(content.split('\n').filter(Boolean).sort().join('\n'));
        return 0;
      },

      df(args) {
        self.println('Filesystem     1K-blocks    Used Available Use% Mounted on');
        self.println('/dev/sda1       30720000 5120000  25600000  17% /');
        return 0;
      },

      du(args) {
        const target = args[0] ? self.vfs.resolve(args[0]) : self.vfs.cwd;
        const size = self.vfs.du(target);
        self.println(`${Math.round(size / 1024)}\t${target}`);
        return 0;
      },

      free(args) {
        self.println('              total        used        free      shared  buff/cache   available');
        self.println('Mem:        3072000     1024000     1024000           0     1024000     2048000');

    const dir = this.vfs.cwd === this.variables.HOME ? '~' : this.vfs.cwd;
    const prompt = `\r\n\x1b[32m${user}@${host}\x1b[0m:\x1b[34m${dir}\x1b[0m$ `;

  parseCommand(input) {
    input = input.trim();
    if (!input) return;
    this.history.push(input);
    this.historyIndex = this.history.length;

    // Handle piping
    if (input.includes('|')) {
      const parts = input.split('|').map(s => s.trim());
      let lastOutput = '';
      for (let i = 0; i < parts.length; i++) {
        const cmdParts = this._tokenize(parts[i]);
        if (cmdParts.length === 0) continue;
        const cmd = cmdParts[0];
        const args = cmdParts.slice(1);
        if (i < parts.length - 1) {
          lastOutput = this._executeWithInput(cmd, args, lastOutput);
        } else {
          this._executeWithInput(cmd, args, lastOutput);
        }
      }
      return;
    }

    // Handle redirection
    let redirectTarget = null;
    let redirectAppend = false;
    let cmdStr = input;

    const appendMatch = cmdStr.match(/>>\s*(\S+)$/);
    const writeMatch = cmdStr.match(/>\s*(\S+)$/);
    
    if (appendMatch) {
      redirectTarget = appendMatch[1];
      redirectAppend = true;
      cmdStr = cmdStr.substring(0, cmdStr.lastIndexOf('>>')).trim();
    } else if (writeMatch) {
      redirectTarget = writeMatch[1];
      cmdStr = cmdStr.substring(0, cmdStr.lastIndexOf('>')).trim();
    }

    const parts = this._tokenize(cmdStr);
    if (parts.length === 0) return;

    let cmd = parts[0];
    const args = parts.slice(1);

    // Variable expansion
    const expandedArgs = args.map(a => {
      return a.replace(/\$(\w+)/g, (m, v) => this.variables[v] || '');
    });

    // Alias expansion
    if (this.aliases[cmd]) {
      const aliasParts = this._tokenize(this.aliases[cmd]);
      const expandedAliasArgs = aliasParts.slice(1).concat(expandedArgs);
      cmd = aliasParts[0];
      return this._executeCmd(cmd, expandedAliasArgs, redirectTarget, redirectAppend);
    }

    this._executeCmd(cmd, expandedArgs, redirectTarget, redirectAppend);
  }

  _tokenize(str) {
    const tokens = [];
    let current = '';
    let inQuote = null;
    for (let i = 0; i < str.length; i++) {
      const c = str[i];
      if (inQuote) {
        if (c === inQuote) { inQuote = null; }
        else { current += c; }
      } else if (c === '"' || c === "'") {
        inQuote = c;
      } else if (c === ' ') {
        if (current) { tokens.push(current); current = ''; }
      } else {
        current += c;
      }
    }
    if (current) tokens.push(current);
    return tokens;
  }

  _executeWithInput(cmd, args, input) {
    // For piped commands, we take input as the data
    if (cmd === 'grep' && input) {
      const lines = input.split('\n');
      const pattern = args[0] || '';
      lines.forEach(l => {
        if (l.includes(pattern)) this.println(l);
      });
    } else if (cmd === 'head' && input) {
      const n = parseInt(args[0]) || 10;
      input.split('\n').slice(0, n).forEach(l => this.println(l));
    } else if (cmd === 'tail' && input) {
      const n = parseInt(args[0]) || 10;
      const lines = input.split('\n');
      lines.slice(Math.max(0, lines.length - n)).forEach(l => this.println(l));
    } else if (cmd === 'sort' && input) {
      input.split('\n').filter(Boolean).sort().forEach(l => this.println(l));
    } else if (cmd === 'uniq' && input) {
      const lines = input.split('\n');
      for (let i = 0; i < lines.length; i++) {
        if (lines[i] !== lines[i-1]) this.println(lines[i]);
      }
    } else if (cmd === 'wc' && input) {
      const lines = input.split('\n').length;
      const words = input.split(/\s+/).filter(Boolean).length;
      const chars = input.length;
      this.println(`${lines} ${words} ${chars}`);
    } else if (cmd === 'cat' && input) {
      this.print(input);
    } else if (cmd === 'echo') {
      this.println(args.join(' ') + (input ? '\n' + input : ''));
    } else {
      // Fallback: try the command with piped input
      const cmdFn = this.commands[cmd];
      if (cmdFn) {
        const output = cmdFn(args);
        if (input) this.print(input);
        return output;
      }
      this.println(`command not found: ${cmd}`);
    }
    return '';
  }

  _executeCmd(cmd, args, redirect, append) {
    const cmdFn = this.commands[cmd];
    if (cmdFn) {
      const output = [];
      const origPrint = this.print.bind(this);
      const origPrintln = this.println.bind(this);
      
      if (redirect) {
        let buf = '';
        this.print = (t) => { buf += t; };
        this.println = (t) => { buf += t + '\n'; };
        cmdFn(args);
        this.print = origPrint;
        this.println = origPrintln;
        const path = this.vfs.resolve(redirect);
        const existing = this.vfs.readFile(path);
        this.vfs.writeFile(path, append ? (existing || '') + buf : buf);
      } else {
        cmdFn(args);
      }
    } else {
      this.println(`bash: ${cmd}: command not found`);
    }
  }
}

// ============================================================
// INIT
// ============================================================
const vfs = new VirtualFileSystem();
const engine = new CommandEngine(term, vfs);

// Handle input
let inputBuffer = '';
let cursorPos = 0;

term.onKey(e => {
  const ev = e.domEvent;
  const key = e.key;

  if (ev.ctrlKey && key === 'c') {
    term.write('^C');
    engine.showPrompt();
    inputBuffer = '';
    cursorPos = 0;
    return;
  }
  if (ev.ctrlKey && key === 'l') {
    term.clear();
    engine.showPrompt();
    return;
  }
  if (ev.ctrlKey && key === 'd') {
    if (inputBuffer.length === 0) {
      engine.println('logout');
      return;
    }
    return;
  }
  if (ev.ctrlKey && key === 'z') {
    term.write('^Z');
    engine.showPrompt();
    inputBuffer = '';
    cursorPos = 0;
    return;
  }

  if (ev.keyCode === 13) { // Enter
    term.write('\r\n');
    engine.parseCommand(inputBuffer);
    inputBuffer = '';
    cursorPos = 0;
    engine.showPrompt();
    return;
  }

  if (ev.keyCode === 8) { // Backspace
    if (cursorPos > 0) {
      inputBuffer = inputBuffer.slice(0, cursorPos - 1) + inputBuffer.slice(cursorPos);
      cursorPos--;
      term.write('\b \b');
    }
    return;
  }

  if (ev.keyCode === 9) { // Tab - simple completion
    ev.preventDefault();
    const words = inputBuffer.split(' ');
    const lastWord = words[words.length - 1];
    const completions = Object.keys(engine.commands).filter(c => c.startsWith(lastWord));
    if (completions.length === 1) {
      const remaining = completions[0].slice(lastWord.length);
      inputBuffer += remaining;
      term.write(remaining);
      cursorPos += remaining.length;
    } else if (completions.length > 1) {
      engine.println('');
      engine.println(completions.join('  '));
      engine.showPrompt();
      term.write(inputBuffer);
    }
    return;
  }

  if (ev.keyCode === 37) { // Left arrow
    if (cursorPos > 0) {
      cursorPos--;
      term.write('\x1b[D');
    }
    return;
  }

  if (ev.keyCode === 39) { // Right arrow
    if (cursorPos < inputBuffer.length) {
      cursorPos++;
      term.write('\x1b[C');
    }
    return;
  }

  if (ev.keyCode === 38) { // Up arrow
    if (engine.historyIndex > 0) {
      while (cursorPos < inputBuffer.length) { term.write('\x1b[C'); cursorPos++; }
      term.write('\b \b'.repeat(inputBuffer.length));
      engine.historyIndex--;
      inputBuffer = engine.history[engine.historyIndex] || '';
      cursorPos = inputBuffer.length;
      term.write(inputBuffer);
    }
    return;
  }

  if (ev.keyCode === 40) { // Down arrow
    if (engine.historyIndex < engine.history.length - 1) {
      while (cursorPos < inputBuffer.length) { term.write('\x1b[C'); cursorPos++; }
      term.write('\b \b'.repeat(inputBuffer.length));
      engine.historyIndex++;
      inputBuffer = engine.history[engine.historyIndex] || '';
      cursorPos = inputBuffer.length;
      term.write(inputBuffer);
    } else if (engine.historyIndex === engine.history.length - 1) {
      while (cursorPos < inputBuffer.length) { term.write('\x1b[C'); cursorPos++; }
      term.write('\b \b'.repeat(inputBuffer.length));
      engine.historyIndex = engine.history.length;
      inputBuffer = '';
      cursorPos = 0;
    }
    return;
  }

  if (ev.keyCode === 46) { // Delete
    if (cursorPos < inputBuffer.length) {
      inputBuffer = inputBuffer.slice(0, cursorPos) + inputBuffer.slice(cursorPos + 1);
      term.write('\x1b[P');
    }
    return;
  }

  if (ev.keyCode === 36) { // Home
    while (cursorPos > 0) { term.write('\x1b[D'); cursorPos--; }
    return;
  }

  if (ev.keyCode === 35) { // End
    while (cursorPos < inputBuffer.length) { term.write('\x1b[C'); cursorPos++; }
    return;
  }

  // Regular character
  if (key.length === 1 && !ev.ctrlKey && !ev.altKey) {
    const before = inputBuffer.slice(0, cursorPos);
    const after = inputBuffer.slice(cursorPos);
    inputBuffer = before + key + after;
    cursorPos++;
    if (cursorPos === inputBuffer.length) {
      term.write(key);
    } else {
      term.write(key + after);
      term.write('\b'.repeat(after.length));
    }
    return;
  }
});

// Handle paste
term.attachCustomKeyEventHandler(e => {
  if (e.ctrlKey && e.key === 'v' && e.type === 'keydown') {
    navigator.clipboard.readText().then(text => {
      text.split('').forEach(c => {
        if (c === '\n') {
          term.write('\r\n');
          engine.parseCommand(inputBuffer);
          inputBuffer = '';
          cursorPos = 0;
          engine.showPrompt();
        } else {
          const before = inputBuffer.slice(0, cursorPos);
          const after = inputBuffer.slice(cursorPos);
          inputBuffer = before + c + after;
          cursorPos++;
          if (cursorPos === inputBuffer.length) {
            term.write(c);
          } else {
            term.write(c + after);
            term.write('\b'.repeat(after.length));
          }
        }
      });
    });
    return false;
  }
  return true;
});

// Send key input from React Native
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'sendKey') {
    const key = e.data.key;
    const fakeEvent = { key, domEvent: { keyCode: key.charCodeAt(0), ctrlKey: false, altKey: false, preventDefault: () => {} }, ctrlKey: false, altKey: false };
    if (key === 'Enter') fakeEvent.domEvent.keyCode = 13;
    else if (key === 'Tab') fakeEvent.domEvent.keyCode = 9;
    else if (key === 'Backspace') fakeEvent.domEvent.keyCode = 8;
    else if (key === 'Escape') fakeEvent.domEvent.keyCode = 27;
    else if (key === 'ArrowUp') fakeEvent.domEvent.keyCode = 38;
    else if (key === 'ArrowDown') fakeEvent.domEvent.keyCode = 40;
    else if (key === 'ArrowLeft') fakeEvent.domEvent.keyCode = 37;
    else if (key === 'ArrowRight') fakeEvent.domEvent.keyCode = 39;
    else if (key.startsWith('Ctrl+')) {
      fakeEvent.domEvent.ctrlKey = true;
      fakeEvent.domEvent.keyCode = key[5].toLowerCase().charCodeAt(0) - 96;
      fakeEvent.key = key[5].toLowerCase();
    }
    term._core.keyDown(fakeEvent.domEvent);
  }
});

// Initial display
engine.println('╔══════════════════════════════════════════╗');
engine.println('║        TerminalVault Linux v1.0          ║');
engine.println('║    A mobile Linux terminal environment   ║');
engine.println('╚══════════════════════════════════════════╝');
engine.println('');
engine.println('Type "help" for available commands.');
engine.showPrompt();

// Save state periodically
setInterval(() => { try { vfs.saveState(); } catch(e) {} }, 30000);
